name: Continuous Integration and Delivery with  Github Actions

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Application .jar
      # Local onde o pom.xml reside 
      working-directory: ./28_DockerizingOurApp/rest-with-spring-boot-and-java
      run: mvn clean package -DskipTests

    - name: Build Docker Image
      # Forçamos o caminho do Dockerfile e o contexto
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot:${{ github.run_id }} \
          -f ./28_DockerizingOurApp/rest-with-spring-boot-and-java/Dockerfile \
          ./28_DockerizingOurApp/rest-with-spring-boot-and-java

    - name: Push to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot:${{ github.run_id }}