name: CI/CD - Spring Boot Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build da imagem Docker
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/rest-with-spring-boot:latest \
            28_DockerizingOurApp/rest-with-spring-boot-and-java

      - name: Push da imagem para Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rest-with-spring-boot:latest
