name: Continuous Integration and Delivery with Github Actions

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      [cite_start]uses: actions/checkout@v4 [cite: 1]

    - name: Login to Docker Hub
      [cite_start]uses: docker/login-action@v3 [cite: 1]
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    - name: Setup Java 21
      uses: actions/setup-java@v4 # Atualizado para v4 para melhor performance
      with:
        java-version: '21'
        distribution: 'temurin' # Alterado para temurin para dar match com seu Dockerfile
        cache: maven

    - name: Build Application .jar with Maven
      # Entra na pasta do código fonte para gerar o artefato
      [cite_start]working-directory: ./28_DockerizingOurApp/rest-with-spring-boot-and-java [cite: 1]
      run: mvn clean package

    - name: Docker Compose Build
      # Entra na pasta onde está o docker-compose.yml 
      [cite_start]working-directory: ./28_DockerizingOurApp [cite: 1]
      run: docker compose build

    - name: Push to Docker Hub Container Registry
      run: |
        # Tagging a imagem gerada pelo compose para o seu repositório pessoal 
        docker tag saulusribeiro/rest-with-spring-boot:latest ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot:latest 
        docker tag saulusribeiro/rest-with-spring-boot:latest ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot:${{ github.run_id }} 
        
        # Upload das imagens
        [cite_start]docker push ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot:latest [cite: 1]
        [cite_start]docker push ${{ secrets.DOCKER_USERNAME }}/rest-with-spring-boot:${{ github.run_id }} [cite: 1]